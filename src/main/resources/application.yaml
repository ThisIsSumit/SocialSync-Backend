server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: social-sync-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/socialsync}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      client:
        provider:
          twitter:
            authorization-uri: https://twitter.com/i/oauth2/authorize
            token-uri: https://api.twitter.com/2/oauth2/token
            user-info-uri: https://api.twitter.com/2/users/me?user.fields=id,name,username
            user-name-attribute: id
          instagram:
            authorization-uri: https://api.instagram.com/oauth/authorize
            token-uri: https://api.instagram.com/oauth/access_token
            user-info-uri: https://graph.instagram.com/me?fields=id,username
            user-name-attribute: id
          linkedin:
            authorization-uri: https://www.linkedin.com/oauth/v2/authorization
            token-uri: https://www.linkedin.com/oauth/v2/accessToken
            user-info-uri: https://api.linkedin.com/v2/userinfo
            user-name-attribute: sub
        registration:
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID}
            client-secret: ${FACEBOOK_CLIENT_SECRET}
            scope:
              - public_profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

          twitter:
            client-id: ${TWITTER_CLIENT_ID}
            client-secret: ${TWITTER_CLIENT_SECRET}
            provider: twitter
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - tweet.read
              - users.read
              - offline.access
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

          instagram:
            client-id: ${INSTAGRAM_CLIENT_ID}
            client-secret: ${INSTAGRAM_CLIENT_SECRET}
            provider: instagram
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - user_profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

          linkedin:
            client-id: ${LINKEDIN_CLIENT_ID:}
            client-secret: ${LINKEDIN_CLIENT_SECRET:}
            provider: linkedin
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

jwt:
  secret: ${JWT_SECRET:replace-me-with-a-secure-env-secret-32-bytes}
  expiration: ${JWT_EXPIRATION_MS:86400000}

app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  oauth:
    mobile-callback-url: ${OAUTH_MOBILE_CALLBACK_URL:socialsync://oauth-callback}
  email:
    from: ${EMAIL_FROM:no-reply@socialsync.local}
    sendgrid:
      api-key: ${SENDGRID_API_KEY:}
  sms:
    enabled: ${SMS_ENABLED:false}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-number: ${TWILIO_FROM_NUMBER:}
  rate-limit:
    auth:
      login-per-minute: ${AUTH_LOGIN_RATE_LIMIT_PER_MINUTE:10}
      signup-per-hour: ${AUTH_SIGNUP_RATE_LIMIT_PER_HOUR:20}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
