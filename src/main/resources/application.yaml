server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: social-sync-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/socialsync}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID}
            client-secret: ${FACEBOOK_CLIENT_SECRET}

          twitter:
            client-id: ${TWITTER_CLIENT_ID}
            client-secret: ${TWITTER_CLIENT_SECRET}

          instagram:
            client-id: ${INSTAGRAM_CLIENT_ID}
            client-secret: ${INSTAGRAM_CLIENT_SECRET}

jwt:
  secret: ${JWT_SECRET:replace-me-with-a-secure-env-secret-32-bytes}
  expiration: ${JWT_EXPIRATION_MS:86400000}

app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  email:
    from: ${EMAIL_FROM:no-reply@socialsync.local}
    sendgrid:
      api-key: ${SENDGRID_API_KEY:}
  sms:
    enabled: ${SMS_ENABLED:false}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-number: ${TWILIO_FROM_NUMBER:}
  rate-limit:
    auth:
      login-per-minute: ${AUTH_LOGIN_RATE_LIMIT_PER_MINUTE:10}
      signup-per-hour: ${AUTH_SIGNUP_RATE_LIMIT_PER_HOUR:20}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
